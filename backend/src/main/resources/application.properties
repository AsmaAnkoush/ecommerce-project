# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=ecommerce-super-secret-key-change-this-in-production-2024
app.jwt.expiration-ms=86400000

# Password reset token lifetime (default 30 minutes)
app.jwt.reset-expiration-ms=1800000

# CORS — comma-separated allowed origins. Override per environment.
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Auth rate limiting (per-IP, sliding window)
app.auth.rate-limit.max-requests=10
app.auth.rate-limit.window-seconds=60

# Public base URL used in password-reset emails / logs
app.public-base-url=http://localhost:5173

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Logging
logging.level.com.ecommerce=DEBUG
